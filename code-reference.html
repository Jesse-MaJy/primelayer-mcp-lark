<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lark Connect 代码参考文档</title>
<style>
:root{
  --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f1629; --card:#1e2a4a;
  --text:#e0e0e0; --muted:#8892b0; --accent:#0ea5e9; --accent2:#0284c7;
  --border:#2a2a4e; --code-bg:#0d1117; --badge-bg:#1e3a5f; --badge-text:#58a6ff;
  --hover:#1a3a5c; --green:#56d364; --orange:#e3b341; --red:#f85149;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans CJK SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px}
code,pre,.mono{font-family:'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,'Courier New',monospace}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:1000;gap:16px}
.nav-brand{font-weight:700;font-size:16px;color:var(--accent);white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:transparent;border:1px solid transparent;color:var(--muted);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;white-space:nowrap}
.nav-tab:hover{background:var(--hover);color:var(--text)}
.nav-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-tab .count{display:inline-block;background:rgba(255,255,255,.2);padding:1px 7px;border-radius:10px;font-size:11px;margin-left:4px}
.nav-tab.active .count{background:rgba(255,255,255,.3)}
.nav-search{margin-left:auto;position:relative}
.nav-search input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px 7px 34px;border-radius:6px;font-size:13px;width:240px;font-family:inherit;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:var(--accent)}
.nav-search::before{content:'\1F50D';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}
.sidebar-toggle{display:none;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:16px}

/* Sidebar */
.sidebar{position:fixed;top:56px;left:0;width:280px;height:calc(100vh - 56px);overflow-y:auto;background:var(--bg3);border-right:1px solid var(--border);padding:12px 0;z-index:900}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.tree-group{margin-bottom:8px}
.tree-group-title{padding:6px 16px;font-size:12px;color:var(--accent);font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;border-bottom:1px solid var(--border);margin-bottom:4px;word-break:break-all}
.tree-list{list-style:none}
.tree-link{display:block;padding:5px 16px 5px 24px;color:var(--muted);text-decoration:none;font-size:13px;transition:all .15s;border-left:2px solid transparent}
.tree-link:hover{background:var(--hover);color:var(--text)}
.tree-link.active{color:var(--accent);border-left-color:var(--accent)}
.tree-link.hidden-by-search{display:none}

/* Content */
.content{margin-left:280px;margin-top:56px;padding:20px 24px;max-width:1400px}
.module-header{margin-bottom:20px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.module-header h2{font-size:20px;color:var(--accent);margin-bottom:4px}
.module-header .meta{font-size:13px;color:var(--muted)}

/* Details panel */
.class-panel{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;scroll-margin-top:70px}
.class-panel>summary{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;background:var(--bg2);border-bottom:1px solid var(--border);list-style:none;user-select:none;flex-wrap:wrap}
.class-panel>summary::-webkit-details-marker{display:none}
.class-panel>summary::before{content:'\25B6';font-size:9px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.class-panel[open]>summary::before{transform:rotate(90deg)}
.class-panel>summary:hover{background:var(--hover)}
.class-name{color:var(--text)}
.type-badge{display:inline-block;padding:2px 8px;font-size:11px;background:var(--badge-bg);color:var(--badge-text);border-radius:4px;font-weight:400;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.panel-body{padding:12px 16px}
.item-desc{color:var(--muted);font-size:13px;margin-bottom:10px}
.item-notes{color:var(--orange);font-size:12px;margin-top:8px;padding:6px 10px;background:rgba(227,179,65,.1);border-radius:4px;border-left:3px solid var(--orange)}

/* Sections */
.section{margin-bottom:12px}
.section-title{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.item-list{list-style:none;padding-left:0}
.item-list li{padding:4px 8px;font-size:13px;border-bottom:1px solid rgba(42,42,78,.4)}
.item-list li:last-child{border-bottom:none}
.item-list li code{color:#79c0ff;font-size:12px}

/* Method table */
.methods-table{width:100%;border-collapse:collapse;font-size:13px}
.methods-table th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:12px}
.methods-table td{padding:8px 12px;border-bottom:1px solid rgba(42,42,78,.4);vertical-align:top}
.methods-table td:first-child{font-family:'JetBrains Mono',monospace;font-size:12px;color:#79c0ff;word-break:break-word}
.methods-table td:last-child{color:var(--text)}
.methods-table tr:hover td{background:rgba(14,165,233,.05)}
.methods-table tr:last-child td{border-bottom:none}

.hidden-by-search{display:none!important}

/* Responsive */
@media(max-width:900px){
  .nav-search{display:none}
  .nav-tab{padding:6px 10px;font-size:12px}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s;z-index:950}
  .sidebar.open{transform:translateX(0)}
  .content{margin-left:0;padding:12px}
  .sidebar-toggle{display:block}
  .nav-brand{font-size:14px}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:940}
.overlay.show{display:block}
@media(min-width:769px){.overlay{display:none!important}}
.no-results{padding:40px;text-align:center;color:var(--muted);font-size:15px}
.group-header{font-size:15px;color:var(--accent);margin:20px 0 10px;padding:8px 0 6px;border-bottom:2px solid var(--border);font-family:'JetBrains Mono',monospace;word-break:break-all}
.content-group{margin-bottom:10px}
</style>
</head>

function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sl(title,items){
if(!items||items.length===0)return'';
return '<div class="section"><h4 class="section-title">'+esc(title)+'</h4><ul class="item-list">'+items.map(function(i){return '<li><code>'+esc(i)+'</code></li>'}).join('')+'</ul></div>';
}
function mt(methods){
if(!methods||methods.length===0)return'';
return '<div class="section"><h4 class="section-title">方法</h4><table class="methods-table"><thead><tr><th style="width:55%">签名</th><th>说明</th></tr></thead><tbody>'+methods.map(function(m){return '<tr><td><code>'+esc(m[0])+'</code></td><td>'+esc(m[1])+'</td></tr>'}).join('')+'</tbody></table></div>';
}
function rt(title,routes){
if(!routes||routes.length===0)return'';
return '<div class="section"><h4 class="section-title">'+esc(title)+'</h4><table class="methods-table"><thead><tr><th style="width:40%">路径</th><th>说明</th></tr></thead><tbody>'+routes.map(function(r){return '<tr><td><code>'+esc(r[0])+'</code></td><td>'+esc(r[1])+'</td></tr>'}).join('')+'</tbody></table></div>';
}
function ri(item){
var s='';
if(item.desc)s+='<p class="item-desc">'+esc(item.desc)+'</p>';
s+=sl('Props',item.props);
s+=sl('字段',item.fields);
s+=sl('变量',item.variables);
s+=sl('Computed',item.computed);
s+=sl('常量',item.constants);
s+=sl('接口',item.interfaces);
s+=sl('类',item.classes);
s+=sl('嵌套 record / class',item.nested);
s+=sl('表格列',item.columns);
s+=rt('路由',item.routes);
s+=mt(item.methods);
if(item.notes)s+='<p class="item-notes">'+esc(item.notes)+'</p>';
return '<details open class="class-panel" data-name="'+esc(item.name.toLowerCase())+'" id="'+esc(item.id)+'"><summary><span class="class-name">'+esc(item.name)+'</span>'+(item.type?'<span class="type-badge">'+esc(item.type)+'</span>':'')+'</summary><div class="panel-body">'+s+'</div></details>';
}
function rm(key){
var mod=DATA[key];
var sb=document.getElementById('sidebar');
var ct=document.getElementById('content');
var gh='',ch='';
mod.groups.forEach(function(g){
gh+='<div class="tree-group"><div class="tree-group-title">'+esc(g.name)+'</div><ul class="tree-list">';
ch+='<div class="content-group"><h3 class="group-header">'+esc(g.name)+'</h3>';
g.items.forEach(function(it){
gh+='<li><a href="#'+esc(it.id)+'" class="tree-link">'+esc(it.name)+'</a></li>';
ch+=ri(it);
});
gh+='</ul></div>';
ch+='</div>';
});
sb.innerHTML=gh;
ct.innerHTML='<div class="module-header"><h2>'+esc(mod.title)+' <span style="font-size:14px;color:var(--muted);font-weight:400">'+esc(mod.subtitle)+'</span></h2><div class="meta">'+mod.count+mod.unit+'</div></div>'+ch;
filterSearch();
}
var currentModule='backend';
function filterSearch(){
var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
var panels=document.querySelectorAll('.class-panel');
var links=document.querySelectorAll('.tree-link');
var visibleCount=0;
panels.forEach(function(p){
var name=p.getAttribute('data-name')||'';
var match=q===''||name.indexOf(q)>=0;
p.classList.toggle('hidden-by-search',!match);
if(match)visibleCount++;
});
links.forEach(function(l){
var txt=(l.textContent||'').toLowerCase();
var match=q===''||txt.indexOf(q)>=0;
l.classList.toggle('hidden-by-search',!match);
});
var nr=document.getElementById('noResults');
if(nr)nr.remove();
if(visibleCount===0&&q!==''){
var ct=document.getElementById('content');
var d=document.createElement('div');
d.id='noResults';d.className='no-results';
d.textContent='没有找到匹配 "'+q+'" 的类';
ct.appendChild(d);
}
}
document.querySelectorAll('.nav-tab').forEach(function(tab){
tab.addEventListener('click',function(){
document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active')});
this.classList.add('active');
currentModule=this.getAttribute('data-module');
document.getElementById('searchInput').value='';
rm(currentModule);
});
});
document.getElementById('searchInput').addEventListener('input',filterSearch);
document.getElementById('sidebarToggle').addEventListener('click',function(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click',function(){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
});
document.getElementById('sidebar').addEventListener('click',function(e){
if(e.target.classList.contains('tree-link')){
if(window.innerWidth<=768){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
}
}
});
rm('backend');
</script>
