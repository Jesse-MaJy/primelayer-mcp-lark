server:
  port: 8080

spring:
  config:
    import:
      - optional:classpath:.env[.properties]
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: lark-connect-agent-gateway
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/lark_connect_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  admin:
    token-ttl-seconds: 28800
    bootstrap-username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:admin123}
  agent:
    max-projects-per-query: 20
    model-timeout-ms: 30000
    mcp-timeout-ms: 30000
    query-progress-notice-ms: 900000
    query-hard-timeout-ms: 1800000
    query-page-batch-size: 5
    max-no-progress-decisions: 3
    model-input-token-budget: 256000
    async-poll-initial-delay-ms: 1000
    async-poll-max-delay-ms: 30000
    form-analysis-timeout-ms: 90000
    final-answer-timeout-ms: 60000
    max-planning-rounds: 2
    max-logical-tool-calls: 32
    max-candidate-forms: 10
    max-stage-planning-calls: 5
  feishu:
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    verification-token: ${FEISHU_VERIFICATION_TOKEN:}
    encrypt-key: ${FEISHU_ENCRYPT_KEY:}
    echo-enabled: ${FEISHU_ECHO_ENABLED:true}
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
  mcp:
    endpoint: ${PRIMELAYER_MCP_ENDPOINT:http://localhost:9000/mcp}
    auth-header-name: ${PRIMELAYER_MCP_AUTH_HEADER:X-API-Key}
